name: Lecture de Fichier

# Déclencheur : à chaque push
on: [push]

jobs:
  verification:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Indispensable pour "cloner" votre code sur le serveur GitHub
      - name: Récupération du code
        uses: actions/checkout@v4

      # Étape 2 : Liste les fichiers pour vérifier qu'on est au bon endroit
      - name: Afficher le contenu du dossier
        run: ls -la

      # Étape 3 : Lire le contenu du fichier texte
      - name: Lire le message
        run: cat message.txt