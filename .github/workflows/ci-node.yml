name: CI Node.js Project

# 1. Déclencheur : Uniquement sur "push" vers "main"
on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    # 2. Environnement : Ubuntu dernière version
    runs-on: ubuntu-latest

    steps:
      # 3. Étapes du workflow

      # A. Récupérer le code (Checkout)
      - name: Checkout repository
        uses: actions/checkout@v4

      # B. Installer Node.js version 18
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # C. Installer les dépendances
      # On utilise une condition : si package.json existe, on installe, sinon on simule.
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "Aucun package.json trouvé, simulation de npm install..."
          fi

      # D. Lancer les tests
      # On simule le lancement pour éviter que le workflow ne plante sans scripts de test.
      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Tests terminés avec succès (Simulation OK)"